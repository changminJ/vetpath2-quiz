<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>📷 수의병리학2 사진 갤러리</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"]{
    --bg-base:#121212; --bg-elevated:#181818; --bg-card:#1f1f1f; --bg-sidebar:#000;
    --text-primary:#fff; --text-muted:#b3b3b3; --text-subdued:#6a6a6a;
    --accent:#1DB954; --accent-hover:#1ED760; --accent-soft:rgba(29,185,84,.15);
    --border:#2a2a2a; --grad-main:linear-gradient(180deg,#1a1a1a 0%,var(--bg-base) 280px);
    --shadow-card:0 4px 20px rgba(0,0,0,.3); --tag-bg:rgba(255,255,255,.06);
    --hover-card:rgba(255,255,255,.07); --imgbg:#0a0a0a;
    --c-심혈관:#ff6b6b; --c-비뇨기:#4fc3f7; --c-내분비:#c792ea;
  }
  [data-theme="light"]{
    --bg-base:#f7f7f5; --bg-elevated:#fff; --bg-card:#fafafa; --bg-sidebar:#fff;
    --text-primary:#121212; --text-muted:#555; --text-subdued:#888;
    --accent:#1aa84b; --accent-hover:#16933f; --accent-soft:rgba(26,168,75,.12);
    --border:#e2e2e0; --grad-main:linear-gradient(180deg,#ececea 0%,var(--bg-base) 280px);
    --shadow-card:0 2px 12px rgba(0,0,0,.06); --tag-bg:rgba(0,0,0,.05);
    --hover-card:rgba(0,0,0,.05); --imgbg:#ececeb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;
    background:var(--bg-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:260px 1fr;height:100vh;gap:8px;padding:8px}
  .menu-btn{display:none;position:fixed;top:12px;left:12px;width:44px;height:44px;border-radius:10px;
    background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);font-size:22px;
    z-index:50;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sidebar-backdrop.active{display:block}
  .sidebar{background:var(--bg-sidebar);border-radius:8px;padding:22px 16px;overflow-y:auto;
    display:flex;flex-direction:column;gap:18px;border:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px;padding:0 6px 14px;border-bottom:1px solid var(--border)}
  .logo-icon{font-size:26px}
  .logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--text-subdued);margin-top:2px}
  .user-info{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(128,128,128,.06);border-radius:8px}
  .user-name{flex:1;font-size:12.5px;font-weight:700}
  .icon-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);font-size:16px;transition:.15s;background:rgba(128,128,128,.08)}
  .icon-btn:hover{color:var(--text-primary);background:rgba(128,128,128,.16)}
  .sidebar-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-subdued);padding:0 8px 8px;font-weight:700}
  .nav-list{display:flex;flex-direction:column;gap:2px}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:6px;
    font-weight:600;font-size:14px;color:var(--text-muted);transition:.15s;width:100%;text-align:left}
  .nav-item:hover{color:var(--text-primary);background:var(--hover-card)}
  .nav-item.active{color:var(--text-primary);background:var(--accent-soft)}
  .nav-item .count{font-size:12px;color:var(--text-subdued);background:var(--tag-bg);padding:2px 8px;border-radius:10px;font-weight:700}
  .nav-item.active .count{color:var(--accent);background:var(--accent-soft)}
  .nav-dot{width:9px;height:9px;border-radius:50%;margin-right:9px;flex:0 0 auto}
  .quiz-link{margin-top:auto;display:block;text-align:center;padding:11px;background:var(--accent-soft);
    color:var(--accent);border:1px solid var(--accent);border-radius:8px;font-size:13px;font-weight:800}
  .quiz-link:hover{background:var(--accent);color:#000}
  .main{background:var(--grad-main);border-radius:8px;overflow-y:auto;padding:28px 32px 60px;border:1px solid var(--border)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px;flex-wrap:wrap}
  .topbar h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .topbar .sub{font-size:13px;color:var(--text-muted);font-weight:600}
  .sec-title{font-size:16px;font-weight:800;margin:26px 0 14px;display:flex;align-items:center;gap:9px;
    padding-bottom:8px;border-bottom:1px solid var(--border)}
  .sec-dot{width:12px;height:12px;border-radius:50%}
  .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .gal-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:var(--shadow-card);transition:transform .15s}
  .gal-card:hover{transform:translateY(-3px)}
  .gal-imgwrap{background:var(--imgbg);display:flex;align-items:center;justify-content:center;
    aspect-ratio:4/3;overflow:hidden;cursor:zoom-in}
  .gal-imgwrap img{width:100%;height:100%;object-fit:contain}
  .gal-cap{padding:11px 13px 13px;font-size:12.5px;color:var(--text-muted);line-height:1.55;flex:1}
  .gal-cap b{color:var(--text-primary)}
  .gal-no{font-size:10px;color:var(--text-subdued);font-weight:700;margin-bottom:4px;letter-spacing:.4px}
  ::-webkit-scrollbar{width:10px}
  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:999px}
  .lightbox-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s}
  .lightbox-backdrop.active{opacity:1;pointer-events:auto}
  .lightbox-panel{position:fixed;inset:0;z-index:901;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
  .lightbox-panel.active{opacity:1;pointer-events:auto}
  .lightbox-panel img{max-width:94vw;max-height:78vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .lightbox-cap{margin-top:16px;max-width:760px;color:#e8edf6;font-size:14px;line-height:1.6;text-align:center}
  .lightbox-close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.12);border-radius:50%;
    width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:902}
  @media(max-width:768px){
    .app{grid-template-columns:1fr;padding:4px}
    .menu-btn{display:flex}
    .sidebar{position:fixed;top:8px;bottom:8px;left:8px;width:280px;max-width:calc(100vw - 16px);z-index:100;
      transform:translateX(calc(-100% - 16px));transition:transform .25s cubic-bezier(.2,.8,.2,1)}
    .sidebar.open{transform:translateX(0)}
    .main{padding:58px 14px 40px}
    .gal-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    .gal-cap{font-size:11.5px}
  }
</style>
</head>
<body>
<div class="app">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="logo"><div class="logo-icon">📷</div>
      <div><div class="logo-text">사진 갤러리</div><div class="logo-sub">수의병리학2 강의안 사진 모음</div></div></div>
    <div class="user-info"><span class="user-name" id="totalLbl">157장 · 캡션 포함</span>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="테마">🌙</button></div>
    <div class="sidebar-section"><h3>과목</h3><nav class="nav-list" id="nav"></nav></div>
    <a class="quiz-link" href="index.html">📝 퀴즈 풀러 가기 →</a>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="lightbox-backdrop" id="lbBack" onclick="closeLb()"></div>
<div class="lightbox-panel" id="lbPanel" onclick="closeLb()">
  <button class="lightbox-close" onclick="closeLb()">×</button>
  <img id="lbImg" src="" alt=""><div class="lightbox-cap" id="lbCap"></div>
</div>
<script src="gallery.js"></script>
<script>
const SUBS=[['전체','#1DB954'],['심혈관','var(--c-심혈관)'],['비뇨기','var(--c-비뇨기)'],['내분비','var(--c-내분비)']];
const COLOR={'심혈관':'var(--c-심혈관)','비뇨기':'var(--c-비뇨기)','내분비':'var(--c-내분비)'};
let theme=localStorage.getItem('galTheme')||'dark';
let cur=localStorage.getItem('galSub')||'전체';
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);document.getElementById('themeBtn').textContent=theme==='dark'?'🌙':'☀️';}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cnt(sub){return sub==='전체'?Object.values(GALLERY).reduce((a,b)=>a+b.length,0):(GALLERY[sub]||[]).length;}
function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  SUBS.forEach(([name,col])=>{
    const b=document.createElement('button');b.className='nav-item'+(cur===name?' active':'');
    b.innerHTML=`<span style="display:flex;align-items:center"><span class="nav-dot" style="background:${col}"></span>${name}</span><span class="count">${cnt(name)}</span>`;
    b.onclick=()=>{cur=name;localStorage.setItem('galSub',name);render();if(window.innerWidth<=768)toggleSidebar(true);};
    nav.appendChild(b);
  });
}
function cardHtml(it,i){
  return `<div class="gal-card"><div class="gal-imgwrap" onclick="openLb('${it.img}',${JSON.stringify(it.caption).replace(/"/g,'&quot;')})">
    <img src="${it.img}" loading="lazy" alt=""></div>
    <div class="gal-cap"><div class="gal-no">#${i}</div>${esc(it.caption)}</div></div>`;
}
function render(){
  applyTheme();renderNav();
  const main=document.getElementById('main');
  const subs=cur==='전체'?['심혈관','비뇨기','내분비']:[cur];
  let h=`<div class="topbar"><h1>📷 강의안 사진 갤러리</h1><span class="sub">${cur} · ${cnt(cur)}장 · 사진 탭하면 확대</span></div>`;
  subs.forEach(s=>{
    const items=GALLERY[s]||[];
    h+=`<div class="sec-title"><span class="sec-dot" style="background:${COLOR[s]}"></span>${s} <span style="color:var(--text-subdued);font-size:13px;font-weight:600">${items.length}장</span></div>`;
    h+=`<div class="gal-grid">`+items.map((it,i)=>cardHtml(it,i+1)).join('')+`</div>`;
  });
  main.innerHTML=h;main.scrollTop=0;
}
window.openLb=function(src,cap){document.getElementById('lbImg').src=src;document.getElementById('lbCap').textContent=cap||'';
  document.getElementById('lbPanel').classList.add('active');document.getElementById('lbBack').classList.add('active');};
window.closeLb=function(){document.getElementById('lbPanel').classList.remove('active');document.getElementById('lbBack').classList.remove('active');};
window.toggleTheme=function(){theme=theme==='dark'?'light':'dark';localStorage.setItem('galTheme',theme);applyTheme();};
window.toggleSidebar=function(force){const sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop');
  const open=force===true?false:!sb.classList.contains('open');sb.classList.toggle('open',open);bd.classList.toggle('active',open);};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
render();
</script>
</body>
</html>
