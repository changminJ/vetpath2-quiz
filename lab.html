<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>🔬 수의병리학실습2 — 사진·주관식 퀴즈</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"]{
    --bg-base:#121212; --bg-elevated:#181818; --bg-card:#1f1f1f; --bg-sidebar:#000;
    --text-primary:#fff; --text-muted:#b3b3b3; --text-subdued:#6a6a6a;
    --accent:#1DB954; --accent-hover:#1ED760; --accent-soft:rgba(29,185,84,.15);
    --correct:#1DB954; --wrong:#f15e6c; --wrong-soft:rgba(241,94,108,.15);
    --warn:#ffa116; --warn-soft:rgba(255,161,22,.15);
    --border:#2a2a2a; --grad-main:linear-gradient(180deg,#1a1a1a 0%,var(--bg-base) 280px);
    --shadow-card:0 4px 20px rgba(0,0,0,.3); --divider:rgba(255,255,255,.08);
    --tag-bg:rgba(255,255,255,.06); --explanation-bg:rgba(255,255,255,.04);
    --input-bg:rgba(255,255,255,.05); --input-border:rgba(255,255,255,.12);
    --imgbg:#0a0a0a; --c-concept:#7dc3ff; --c-photo:#7ee0c0;
  }
  [data-theme="light"]{
    --bg-base:#f7f7f5; --bg-elevated:#fff; --bg-card:#fafafa; --bg-sidebar:#fff;
    --text-primary:#121212; --text-muted:#555; --text-subdued:#888;
    --accent:#1aa84b; --accent-hover:#16933f; --accent-soft:rgba(26,168,75,.12);
    --correct:#1aa84b; --wrong:#d63b48; --wrong-soft:rgba(214,59,72,.1);
    --warn:#d97706; --warn-soft:rgba(217,119,6,.12);
    --border:#e2e2e0; --grad-main:linear-gradient(180deg,#ececea 0%,var(--bg-base) 280px);
    --shadow-card:0 2px 12px rgba(0,0,0,.06); --divider:rgba(0,0,0,.08);
    --tag-bg:rgba(0,0,0,.05); --explanation-bg:rgba(0,0,0,.03);
    --input-bg:rgba(0,0,0,.03); --input-border:rgba(0,0,0,.14); --imgbg:#ececeb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;
    background:var(--bg-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;line-height:1.55}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr 84px;height:100vh;gap:8px;padding:8px}
  .menu-btn{display:none;position:fixed;top:12px;left:12px;width:44px;height:44px;border-radius:10px;
    background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);font-size:22px;
    z-index:50;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .sidebar-backdrop.active{display:block}
  .sidebar{grid-row:1;background:var(--bg-sidebar);border-radius:8px;padding:22px 16px;overflow-y:auto;
    display:flex;flex-direction:column;gap:18px;border:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px;padding:0 6px 14px;border-bottom:1px solid var(--border)}
  .logo-icon{font-size:26px}.logo-text{font-size:16px;font-weight:800;letter-spacing:-.3px}
  .logo-sub{font-size:11px;color:var(--text-subdued);margin-top:2px}
  .user-info{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(128,128,128,.06);border-radius:8px}
  .user-name{flex:1;font-size:12px;font-weight:700}
  .icon-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;background:rgba(128,128,128,.08)}
  .sidebar-section h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-subdued);padding:0 8px 8px;font-weight:700}
  .nav-list{display:flex;flex-direction:column;gap:2px}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:6px;font-weight:600;font-size:14px;color:var(--text-muted);width:100%;text-align:left}
  .nav-item:hover{color:var(--text-primary);background:rgba(128,128,128,.07)}
  .nav-item.active{color:var(--text-primary);background:var(--accent-soft)}
  .nav-item .count{font-size:12px;color:var(--text-subdued);background:var(--tag-bg);padding:2px 8px;border-radius:10px;font-weight:700}
  .nav-dot{width:9px;height:9px;border-radius:50%;margin-right:9px}
  .stats-card{background:linear-gradient(135deg,var(--accent-soft),rgba(29,185,84,.05));border-radius:8px;padding:14px;margin-top:auto}
  .stats-card h4{font-size:12px;color:var(--accent);margin-bottom:8px;font-weight:700}
  .stats-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text-muted)}
  .stats-row span:last-child{color:var(--text-primary);font-weight:700}
  .reset-btn{width:100%;margin-top:10px;padding:8px;background:var(--wrong-soft);color:var(--wrong);border:1px solid var(--wrong);border-radius:6px;font-size:12px;font-weight:700}
  .quiz-link{display:block;text-align:center;padding:9px;background:rgba(128,128,128,.06);border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-weight:700;color:var(--text-muted);margin-top:8px}
  .main{grid-row:1;background:var(--grad-main);border-radius:8px;overflow-y:auto;padding:28px 34px 36px;border:1px solid var(--border)}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .topbar h1{font-size:21px;font-weight:800;letter-spacing:-.5px}
  .progress-text{font-size:13px;color:var(--text-muted);font-weight:600}
  .progress-bar-wrap{height:4px;background:var(--tag-bg);border-radius:999px;overflow:hidden;margin-bottom:24px}
  .progress-bar{height:100%;background:var(--accent);border-radius:999px;transition:width .4s}
  .card{background:var(--bg-elevated);border-radius:12px;padding:28px;box-shadow:var(--shadow-card);border:1px solid var(--border)}
  .badges{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .pill{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:700;color:#0d1320}
  .pill-concept{background:var(--c-concept)} .pill-photo{background:var(--c-photo)}
  .pill-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);font-weight:600}
  .qno{color:var(--text-subdued);font-size:12px;font-weight:700;margin-left:auto}
  .stem{font-size:14.5px;color:var(--text-muted);line-height:1.6;margin-bottom:14px;white-space:pre-wrap;
    background:var(--explanation-bg);border-left:3px solid var(--accent);padding:12px 14px;border-radius:8px}
  .qtext{font-size:17px;font-weight:700;line-height:1.45;margin-bottom:14px;white-space:pre-wrap}
  .clickable{cursor:pointer;border-radius:8px;transition:opacity .15s}
  .clickable:hover{opacity:.82}
  .taphint{font-size:10.5px;color:var(--text-subdued);font-weight:600;background:var(--tag-bg);padding:2px 8px;border-radius:999px;white-space:nowrap;margin-left:6px}
  .bm{font-size:16px;margin-left:8px;opacity:.32;transition:.15s;background:none;line-height:1}
  .bm.on{opacity:1}.bm:hover{opacity:.85;transform:scale(1.12)}
  .imgrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .imgrow .thumb{flex:1 1 200px;max-width:320px;background:var(--imgbg);border:1px solid var(--border);border-radius:8px;
    aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:zoom-in}
  .imgrow .thumb img{width:100%;height:100%;object-fit:contain}
  .sa-input{width:100%;min-height:46px;padding:11px 14px;background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:8px;color:var(--text-primary);font:inherit;font-size:14px;resize:vertical;margin-bottom:10px}
  .sa-input:focus{outline:none;border-color:var(--accent)}
  .reveal{margin-top:10px;padding:14px 16px;background:var(--explanation-bg);border-radius:8px;border-left:3px solid var(--accent);display:none}
  .reveal.show{display:block}
  .ans{font-weight:800;color:var(--accent);font-size:15px;margin-bottom:7px}
  .exp{font-size:13.5px;color:var(--text-primary);line-height:1.65;white-space:pre-wrap}
  .sub{border-top:1px solid var(--divider);padding-top:16px;margin-top:16px}
  .sub:first-of-type{border-top:none;margin-top:0;padding-top:0}
  .subq{font-size:15px;font-weight:700;margin-bottom:9px}
  .subq .n{color:var(--accent);margin-right:6px}
  .btn{font-size:13px;padding:8px 15px;border-radius:999px;background:var(--tag-bg);font-weight:700;color:var(--text-primary)}
  .btn:hover{background:rgba(128,128,128,.16)}
  .btn.primary{background:var(--accent);color:#000;font-weight:800}
  .mark{display:flex;gap:8px;margin-top:10px}
  .mark button{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg-card);font-weight:700}
  .mark .o.on{background:var(--accent);color:#000;border-color:var(--accent)}
  .mark .x.on{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .player{grid-row:2;grid-column:1/-1;background:var(--bg-elevated);border-radius:8px;padding:12px 22px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-card);border:1px solid var(--border)}
  .player-info{min-width:120px}.player-info .now{font-size:13px;font-weight:700}.player-info .meta{font-size:11px;color:var(--text-muted)}
  .player-controls{display:flex;gap:8px;flex:1;justify-content:center}
  .ctrl-btn{padding:10px 18px;background:var(--tag-bg);border-radius:999px;font-size:13px;font-weight:700;color:var(--text-primary)}
  .ctrl-btn.primary{background:var(--accent);color:#000;font-weight:800;padding:10px 22px}
  .player-extra{font-size:11px;color:var(--text-subdued);min-width:70px;text-align:right;font-weight:600}
  ::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:rgba(128,128,128,.25);border-radius:999px}
  .lb-back{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:900;opacity:0;pointer-events:none;transition:.2s}
  .lb-back.active{opacity:1;pointer-events:auto}
  .lb{position:fixed;inset:0;z-index:901;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:.2s}
  .lb.active{opacity:1;pointer-events:auto}.lb img{max-width:94vw;max-height:90vh;object-fit:contain;border-radius:8px}
  .lb-close{position:fixed;top:18px;right:20px;background:rgba(255,255,255,.13);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:902}
  @media(max-width:768px){
    .app{grid-template-columns:1fr;grid-template-rows:1fr 78px;padding:4px}
    .menu-btn{display:flex}
    .sidebar{position:fixed;top:8px;bottom:90px;left:8px;width:280px;max-width:calc(100vw - 16px);z-index:100;transform:translateX(calc(-100% - 16px));transition:transform .25s}
    .sidebar.open{transform:translateX(0)}
    .main{padding:58px 14px 20px}.card{padding:18px 15px}.player-extra{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-backdrop" id="backdrop" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="logo"><div class="logo-icon">🔬</div>
      <div><div class="logo-text">병리실습2 퀴즈</div><div class="logo-sub">사진 116 + 개념 18 · 주관식</div></div></div>
    <div class="user-info"><span class="user-name">면역세포·케이스·사진판독 / 탭하면 정답</span>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙</button></div>
    <div class="sidebar-section"><h3>구성 (개념 → 사진)</h3><nav class="nav-list" id="nav"></nav></div>
    <div class="stats-card">
      <h4>📊 자가 채점</h4>
      <div class="stats-row"><span>맞춤</span><span id="stO">0</span></div>
      <div class="stats-row"><span>틀림</span><span id="stX">0</span></div>
      <div class="stats-row"><span>채점한 문항</span><span id="stM">0</span></div>
      <button class="reset-btn" onclick="resetAll()">🗑️ 초기화</button>
      <a class="quiz-link" href="index.html">📝 이론 퀴즈로</a>
      <a class="quiz-link" href="gallery.html">📷 사진 갤러리</a>
    </div>
  </aside>
  <main class="main" id="main"></main>
  <div class="player" id="player"></div>
</div>
<div class="lb-back" id="lbBack" onclick="closeLb()"></div>
<div class="lb" id="lb" onclick="closeLb()"><button class="lb-close" onclick="closeLb()">×</button><img id="lbImg" src=""></div>
<script src="lab.js"></script>
<script>
const LS='pathoLabV1';
let ST=load(); function load(){try{const j=JSON.parse(localStorage.getItem(LS));if(j&&j.marks){if(!j.bookmarks)j.bookmarks={};return j;}}catch(e){}return{marks:{},theme:'dark',bookmarks:{}};}
function save(){localStorage.setItem(LS,JSON.stringify(ST));}
// flat item list: concept items then case items
const ITEMS=[...LAB.concept.map(c=>({type:'concept',data:c})), ...LAB.cases.map(c=>({type:'case',data:c}))];
let cur=0, flt='all';
function ikey(it){return it.data.id;}
function view(){
  if(flt==='all')return ITEMS;
  if(flt==='concept')return ITEMS.filter(it=>it.type==='concept');
  if(flt==='bookmark')return ITEMS.filter(it=>ST.bookmarks[ikey(it)]);
  return ITEMS.filter(it=>it.type==='case'&&it.data.group===flt);
}
function applyTheme(){document.documentElement.setAttribute('data-theme',ST.theme);document.getElementById('themeBtn').textContent=ST.theme==='dark'?'🌙':'☀️';}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(s){return esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
function nConcept(){return LAB.concept.length;}
function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  const cc=ITEMS.filter(it=>it.type==='concept').length;
  const g=(name)=>ITEMS.filter(it=>it.type==='case'&&it.data.group===name).length;
  const bm=ITEMS.filter(it=>ST.bookmarks[ikey(it)]).length;
  const groups=[
    ['개념문제','concept','var(--c-concept)',cc],
    ['🔬 면역세포 식별','면역세포','#ffd54f',g('면역세포')],
    ['📋 케이스 판독','케이스','var(--c-photo)',g('케이스')],
    ['📷 사진 판독','사진','#7dc3ff',g('사진')],
    ['🔖 북마크','bookmark','#ff9e64',bm],
  ];
  groups.forEach(([name,mode,col,n])=>{
    const b=document.createElement('button');b.className='nav-item'+(flt===mode?' active':'');
    b.innerHTML=`<span style="display:flex;align-items:center"><span class="nav-dot" style="background:${col}"></span>${name}</span><span class="count">${n}</span>`;
    b.onclick=()=>{flt=mode;cur=0;render();if(window.innerWidth<=768)toggleSidebar(true);};
    nav.appendChild(b);
  });
  const marks=Object.values(ST.marks);
  document.getElementById('stO').textContent=marks.filter(m=>m==='o').length;
  document.getElementById('stX').textContent=marks.filter(m=>m==='x').length;
  document.getElementById('stM').textContent=marks.length;
}
function revealBlock(key,a,explain){
  return `<div class="reveal" id="rv-${key}">
    <div class="ans">정답: ${md(a)}</div><div class="exp">${md(explain||'')}</div>
    <div class="mark"><button class="o${ST.marks[key]==='o'?' on':''}" onclick="event.stopPropagation();setMark('${key}','o')">⭕ 맞춤</button>
    <button class="x${ST.marks[key]==='x'?' on':''}" onclick="event.stopPropagation();setMark('${key}','x')">❌ 틀림</button></div></div>`;
}
function render(){
  applyTheme();renderNav();
  const list=view();const main=document.getElementById('main');
  if(!list.length){main.innerHTML='<div class="card" style="text-align:center;color:var(--text-muted);padding:50px">해당 문항이 없습니다.<br>(북마크는 문항의 🔖 버튼으로 추가)</div>';renderPlayer();return;}
  if(cur>=list.length)cur=list.length-1; if(cur<0)cur=0;
  const it=list[cur];
  const pct=Math.round((cur+1)/list.length*100);
  let h=`<div class="topbar"><h1>🔬 병리실습2 퀴즈</h1><span class="progress-text">${cur+1} / ${list.length} · ${pct}%</span></div>`;
  h+=`<div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>`;
  if(it.type==='concept'){
    const c=it.data;
    h+=`<div class="card"><div class="badges"><span class="pill pill-concept">개념문제</span><span class="qno">${cur+1}/${list.length}</span><button class="bm${ST.bookmarks[c.id]?' on':''}" onclick="toggleBm('${c.id}')" title="북마크">🔖</button></div>`;
    h+=`<div class="qtext clickable" onclick="toggleReveal('${c.id}')">${md(c.q)}<span class="taphint">👆 탭하면 정답</span></div>`;
    h+=revealBlock(c.id,c.a,c.explain);
    h+=`</div>`;
  } else {
    const c=it.data;
    h+=`<div class="card"><div class="badges"><span class="pill pill-photo">📷 사진문제</span><span class="pill pill-ghost">${esc(c.case)}</span><span class="qno">${c.subs.length} 서브</span><button class="bm${ST.bookmarks[c.id]?' on':''}" onclick="toggleBm('${c.id}')" title="북마크">🔖</button></div>`;
    if(c.stem)h+=`<div class="stem">${md(c.stem)}</div>`;
    if(c.imgs&&c.imgs.length){h+=`<div class="imgrow">`+c.imgs.map(s=>`<div class="thumb" onclick="openLb('${s}')"><img src="${s}" loading="lazy"></div>`).join('')+`</div>`;}
    c.subs.forEach((s,i)=>{
      const key=c.id+'-'+i;
      h+=`<div class="sub"><div class="subq clickable" onclick="toggleReveal('${key}')"><span class="n">(${i+1})</span>${md(s.q)}<span class="taphint">👆 탭</span></div>`;
      h+=revealBlock(key,s.a,s.explain);
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  main.innerHTML=h;main.scrollTop=0;renderPlayer();
}
function renderPlayer(){
  const list=view();const p=document.getElementById('player');if(!list.length){p.innerHTML='';return;}
  const ci=Math.min(Math.max(cur,0),list.length-1);const pct=Math.round((ci+1)/list.length*100);const it=list[ci];
  const label=it.type==='concept'?'개념문제':'사진문제';
  p.innerHTML=`<div class="player-info"><div class="now">${label}</div><div class="meta">${ci+1} / ${list.length}</div></div>
    <div class="player-controls"><button class="ctrl-btn" onclick="move(-1)">← 이전</button><button class="ctrl-btn primary" onclick="move(1)">다음 →</button></div>
    <div class="player-extra">${pct}%</div>`;
}
window.toggleReveal=function(key){const r=document.getElementById('rv-'+key);const b=document.getElementById('rb-'+key);
  if(r){const sh=r.classList.toggle('show');if(b)b.textContent=sh?'정답 숨기기':'정답·해설 보기';}};
window.setMark=function(key,v){ST.marks[key]=(ST.marks[key]===v?undefined:v);if(ST.marks[key]===undefined)delete ST.marks[key];save();renderNav();
  // update button states without full re-render
  const r=document.getElementById('rv-'+key);if(r){r.querySelector('.o').classList.toggle('on',ST.marks[key]==='o');r.querySelector('.x').classList.toggle('on',ST.marks[key]==='x');}};
window.move=function(d){const n=view().length;if(!n)return;cur=Math.max(0,Math.min(n-1,cur+d));render();};
window.toggleBm=function(id){if(ST.bookmarks[id])delete ST.bookmarks[id];else ST.bookmarks[id]=true;save();render();};
window.toggleTheme=function(){ST.theme=ST.theme==='dark'?'light':'dark';save();applyTheme();};
window.toggleSidebar=function(force){const sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop');const open=force===true?false:!sb.classList.contains('open');sb.classList.toggle('open',open);bd.classList.toggle('active',open);};
window.openLb=function(src){document.getElementById('lbImg').src=src;document.getElementById('lb').classList.add('active');document.getElementById('lbBack').classList.add('active');};
window.closeLb=function(){document.getElementById('lb').classList.remove('active');document.getElementById('lbBack').classList.remove('active');};
window.resetAll=function(){if(!confirm('자가채점 기록 초기화? (북마크 유지)'))return;ST={marks:{},theme:ST.theme,bookmarks:ST.bookmarks};save();render();};
