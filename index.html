<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수의병리학2 기말 퀴즈</title>
<style>
  :root{
    --bg:#0f1420; --card:#1a2233; --card2:#222c42; --line:#33425f;
    --txt:#e8edf6; --muted:#9fb0cc; --accent:#4f8cff;
    --ok:#2ecc71; --bad:#ff5d5d; --miss:#ffc83d;
    --cardio:#ff6b6b; --urinary:#4fc3f7; --endo:#c792ea; --jokbo:#ffb74d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    line-height:1.55;-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:rgba(15,20,32,.96);
    border-bottom:1px solid var(--line);padding:10px 14px;backdrop-filter:blur(6px)}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  h1{font-size:16px;margin:0 8px 0 0}
  .stat{font-size:13px;color:var(--muted)}
  .stat b{color:var(--txt)}
  .chips{margin-top:8px}
  .chip{font-size:12.5px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);cursor:pointer;user-select:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  main{max-width:760px;margin:0 auto;padding:16px 14px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;color:#0d1320}
  .b-심혈관{background:var(--cardio)} .b-비뇨기{background:var(--urinary)}
  .b-내분비{background:var(--endo)}
  .b-jokbo{background:var(--jokbo)} .b-multi{background:var(--miss)}
  .b-img{background:#7ee0c0}
  .b-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600}
  .qnum{color:var(--muted);font-size:12.5px;margin-left:auto}
  .qtext{font-size:16px;font-weight:600;margin:2px 0 12px;white-space:pre-wrap}
  .qimg{display:block;max-width:100%;max-height:380px;margin:0 auto 12px;
    border-radius:10px;border:1px solid var(--line);cursor:zoom-in}
  .multi-note{color:var(--miss);font-weight:700;font-size:13px;margin:-6px 0 10px}
  .choices{display:flex;flex-direction:column;gap:9px}
  .choice{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:10px;
    border:1px solid var(--line);background:var(--card2);cursor:pointer;font-size:14.5px}
  .choice:hover{border-color:#4a5c80}
  .choice .mark{flex:0 0 auto;font-weight:800;color:var(--muted)}
  .choice.sel{border-color:var(--accent);background:#23304d}
  .choice.sel .mark{color:var(--accent)}
  .choice.ok{border-color:var(--ok);background:rgba(46,204,113,.14)}
  .choice.ok .mark{color:var(--ok)}
  .choice.bad{border-color:var(--bad);background:rgba(255,93,93,.14)}
  .choice.bad .mark{color:var(--bad)}
  .choice.miss{border-color:var(--miss);background:rgba(255,200,61,.10)}
  .choice.miss .mark{color:var(--miss)}
  .choice.locked{cursor:default}
  .actions{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
  .explain{margin-top:14px;padding:13px 14px;border-radius:10px;border:1px solid var(--line);
    background:#141b2b;font-size:14px;white-space:pre-wrap;display:none}
  .explain.show{display:block}
  .explain .verdict{font-weight:800;margin-bottom:7px}
  .v-ok{color:var(--ok)} .v-bad{color:var(--bad)}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px}
  .dots{font-size:12px;color:var(--muted)}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;cursor:zoom-out}
  .lightbox img{max-width:100%;max-height:100%}
  .lightbox.show{display:flex}
  .empty{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>🔬 수의병리학2 기말 퀴즈</h1>
    <span class="stat">점수 <b id="score">0</b>/<b id="answered">0</b> · 진행 <b id="prog">0</b>/<b id="total">0</b></span>
    <button class="btn" id="shuffleBtn" style="margin-left:auto">🔀 섞기</button>
    <button class="btn" id="resetBtn">↺ 초기화</button>
  </div>
  <div class="row chips" id="chips"></div>
</header>
<main>
  <div id="stage"></div>
  <div class="nav">
    <button class="btn" id="prevBtn">← 이전</button>
    <span class="dots" id="dots"></span>
    <button class="btn primary" id="nextBtn">다음 →</button>
  </div>
</main>
<div class="lightbox" id="lightbox"><img id="lbimg" src="" alt=""></div>

<script src="questions.js"></script>
<script>
const CIRC = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
const FILTERS = [
  ['전체', q=>true],
  ['심혈관', q=>q.part==='심혈관'],
  ['비뇨기', q=>q.part==='비뇨기'],
  ['내분비', q=>q.part==='내분비'],
  ['족보', q=>q.source==='족보'],
  ['사진', q=>!!q.img],
  ['모두고르시오', q=>q.type==='multi'],
  ['오답', q=>{const s=STATE.ans[q.id]; return s && s.checked && !s.correct;}],
];
const LS='pathoQuizV2';
let STATE = load();
function load(){
  try{const j=JSON.parse(localStorage.getItem(LS)); if(j&&j.ans) return j;}catch(e){}
  return {ans:{}, filter:0, order:null};
}
function save(){localStorage.setItem(LS, JSON.stringify(STATE));}

let order = STATE.order && STATE.order.length===QUESTIONS.length
  ? STATE.order : QUESTIONS.map((q,i)=>i);
let curId = null;

function activeList(){
  const f = FILTERS[STATE.filter][1];
  return order.map(i=>QUESTIONS[i]).filter(f);
}
function renderChips(){
  const el = document.getElementById('chips'); el.innerHTML='';
  FILTERS.forEach((f,idx)=>{
    const n = order.map(i=>QUESTIONS[i]).filter(f[1]).length;
    const c = document.createElement('span');
    c.className='chip'+(STATE.filter===idx?' on':'');
    c.textContent = f[0]+' '+n;
    c.onclick=()=>{STATE.filter=idx; save(); curId=null; render();};
    el.appendChild(c);
  });
}
function updateStats(){
  const ansd = Object.values(STATE.ans).filter(a=>a.checked);
  document.getElementById('score').textContent = ansd.filter(a=>a.correct).length;
  document.getElementById('answered').textContent = ansd.length;
  document.getElementById('total').textContent = QUESTIONS.length;
}
function setEq(a,b){a=[...a].sort();b=[...b].sort();return a.length===b.length&&a.every((v,i)=>v===b[i]);}

function render(){
  renderChips(); updateStats();
  const list = activeList();
  const stage = document.getElementById('stage');
  if(list.length===0){stage.innerHTML='<div class="empty">해당 필터 문항 없음</div>';
    document.getElementById('dots').textContent='';return;}
  let pos = list.findIndex(q=>q.id===curId);
  if(pos<0){pos=0; curId=list[0].id;}
  document.getElementById('prog').textContent = pos+1;
  document.getElementById('dots').textContent = (pos+1)+' / '+list.length;
  const q = list[pos];
  const st = STATE.ans[q.id] || {selected:[], checked:false, correct:false};

  const badges = [];
  badges.push(`<span class="badge b-${q.part}">${q.part}</span>`);
  if(q.source==='족보') badges.push(`<span class="badge b-jokbo">족보 ${q.exam||''}</span>`);
  if(q.type==='multi') badges.push(`<span class="badge b-multi">모두 고르시오</span>`);
  if(q.img) badges.push(`<span class="badge b-img">사진</span>`);
  if(q.topic) badges.push(`<span class="badge b-ghost">${q.topic}</span>`);

  let html = `<div class="card"><div class="badges">${badges.join('')}<span class="qnum">#${q.id}</span></div>`;
  html += `<div class="qtext">${esc(q.q)}</div>`;
  if(q.type==='multi') html += `<div class="multi-note">⚠️ 정답이 1개 이상일 수 있음 (개수 비공개)</div>`;
  if(q.img) html += `<img class="qimg" src="${q.img}" alt="사진문항" onclick="zoom(this.src)">`;
  html += `<div class="choices">`;
  q.choices.forEach((ch,i)=>{
    const n=i+1; let cls='choice';
    const sel = st.selected.includes(n);
    if(st.checked){
      const isAns = q.answer.includes(n);
      cls += ' locked';
      if(isAns && sel) cls+=' ok';
      else if(!isAns && sel) cls+=' bad';
      else if(isAns && !sel) cls+=' miss';
    } else if(sel){ cls+=' sel'; }
    html += `<div class="${cls}" onclick="pick(${q.id},${n})">
      <span class="mark">${CIRC[i]||(n+'.')}</span><span>${esc(ch)}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="actions">`;
  if(!st.checked) html += `<button class="btn primary" onclick="check(${q.id})">정답 확인</button>`;
  else html += `<button class="btn" onclick="retry(${q.id})">↺ 다시 풀기</button>`;
  html += `</div>`;
  const showExp = st.checked;
  const correctMarks = q.answer.map(a=>CIRC[a-1]).join('');
  html += `<div class="explain${showExp?' show':''}">`;
  if(showExp){
    html += `<div class="verdict ${st.correct?'v-ok':'v-bad'}">${st.correct?'⭕ 정답':'❌ 오답'} — 정답: ${correctMarks}</div>`;
    html += esc(q.explain);
  }
  html += `</div></div>`;
  stage.innerHTML = html;
}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

window.pick=function(id,n){
  const q = QUESTIONS.find(x=>x.id===id);
  let st = STATE.ans[id] || {selected:[],checked:false,correct:false};
  if(st.checked) return;
  if(q.type==='single'){ st.selected=[n]; }
  else { st.selected = st.selected.includes(n) ? st.selected.filter(x=>x!==n) : [...st.selected,n]; }
  STATE.ans[id]=st; save(); render();
};
window.check=function(id){
  const q = QUESTIONS.find(x=>x.id===id);
  let st = STATE.ans[id] || {selected:[],checked:false,correct:false};
  if(st.selected.length===0){alert('선지를 선택하세요');return;}
  st.checked=true; st.correct=setEq(st.selected,q.answer);
  STATE.ans[id]=st; save(); render();
};
window.retry=function(id){ STATE.ans[id]={selected:[],checked:false,correct:false}; save(); render(); };
window.zoom=function(src){const lb=document.getElementById('lightbox');
  document.getElementById('lbimg').src=src; lb.classList.add('show');};
document.getElementById('lightbox').onclick=function(){this.classList.remove('show');};

function move(d){
  const list=activeList(); if(!list.length)return;
  let pos=list.findIndex(q=>q.id===curId); if(pos<0)pos=0;
  pos=Math.max(0,Math.min(list.length-1,pos+d)); curId=list[pos].id; render();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('prevBtn').onclick=()=>move(-1);
document.getElementById('nextBtn').onclick=()=>move(1);
document.getElementById('shuffleBtn').onclick=()=>{
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  STATE.order=order; save(); curId=null; render();
};
document.getElementById('resetBtn').onclick=()=>{
  if(!confirm('모든 답·점수를 초기화할까요?'))return;
  STATE={ans:{},filter:0,order:null}; order=QUESTIONS.map((q,i)=>i); save(); curId=null; render();
};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')move(-1); if(e.key==='ArrowRight')move(1);
});
render();
</script>
</body>
</html>
